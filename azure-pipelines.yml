# Seersware Portal — Azure DevOps Pipeline
#
# Deploys to Cloudflare Pages via Wrangler CLI.
# Required variable group: 'cloudflare-deploy' with:
#   CLOUDFLARE_API_TOKEN  (secret)
#   CLOUDFLARE_ACCOUNT_ID

trigger:
  branches:
    include:
      - main

pr: none

pool:
  vmImage: ubuntu-latest

variables:
  - group: cloudflare-deploy

steps:
  - task: UseNode@1
    displayName: 'Use Node.js 20'
    inputs:
      version: '20.x'

  - script: npm ci
    displayName: 'Install dependencies'

  - script: npm run build
    displayName: 'Build Astro site'

  - script: npx wrangler pages deploy dist --project-name seersware-portal --commit-dirty=true
    displayName: 'Deploy to Cloudflare Pages'
    env:
      CLOUDFLARE_API_TOKEN: $(CLOUDFLARE_API_TOKEN)
      CLOUDFLARE_ACCOUNT_ID: $(CLOUDFLARE_ACCOUNT_ID)
